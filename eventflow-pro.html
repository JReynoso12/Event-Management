<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eventflow Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;--surface3:#26262c;
  --border:#2e2e35;--border2:#3a3a44;
  --text:#f0eff5;--text2:#9998aa;--text3:#64637a;
  --accent:#c8a96e;--accent2:#e8c98a;--accent-dim:rgba(200,169,110,.12);--accent-dim2:rgba(200,169,110,.06);
  --green:#4ade80;--green-dim:rgba(74,222,128,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,.12);
  --yellow:#facc15;--purple:#a78bfa;--purple-dim:rgba(167,139,250,.12);
  --r:10px;--rlg:16px;
  --sidebar:240px;
  --font-d:'DM Serif Display',Georgia,serif;
  --font-b:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* AUTH */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,169,110,.08) 0%,transparent 60%);pointer-events:none}
.auth-card{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:48px 40px;position:relative;z-index:1}
.auth-logo{font-family:var(--font-d);font-size:26px;color:var(--accent);margin-bottom:4px}
.auth-tagline{color:var(--text3);font-size:12px;margin-bottom:32px}
.auth-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--r);padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:7px;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);transition:all .2s;border:none;background:transparent}
.auth-tab.active{background:var(--surface2);color:var(--text)}

/* FORMS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.field select option{background:var(--surface2)}
.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#1a1508}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid transparent}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid transparent}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%;justify-content:center;padding:11px}
.btn-icon{padding:6px;border-radius:8px}

/* LAYOUT */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s}
.sidebar-header{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:var(--font-d);font-size:19px;color:var(--accent)}
.sidebar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sidebar-nav{padding:10px 8px;flex:1}
.sidebar-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:10px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:9px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:var(--text)}
.user-role{font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:16px;font-weight:600;color:var(--text)}
.topbar-breadcrumb{font-size:11px;color:var(--text3);margin-top:1px}
.menu-btn{display:none;background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;color:var(--text2)}
.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg)}
.card-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-body{padding:18px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:18px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600;margin-bottom:7px}
.stat-value{font-size:26px;font-family:var(--font-d);color:var(--text);line-height:1;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text3)}

/* EVENTS */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.event-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s}
.event-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.event-card:hover::before{opacity:1}
.event-type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.badge-wedding{background:rgba(167,139,250,.15);color:var(--purple)}
.badge-birthday{background:rgba(251,146,60,.15);color:var(--orange)}
.badge-corporate{background:rgba(96,165,250,.15);color:var(--blue)}
.badge-other{background:var(--surface3);color:var(--text2)}
.event-name{font-size:16px;font-weight:600;margin-bottom:5px;color:var(--text)}
.event-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-bottom:3px}
.event-progress{margin-top:12px}
.event-actions{display:flex;gap:5px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:20px;border:1px solid var(--border);width:fit-content;flex-wrap:wrap}
.tab{padding:7px 15px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);transition:all .2s;border:none;background:transparent}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--rlg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:11px 14px;font-size:13px;color:var(--text)}

/* STATUS BADGES */
.status{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.status-pending{background:rgba(250,204,21,.1);color:var(--yellow)}
.status-ongoing{background:var(--blue-dim);color:var(--blue)}
.status-done{background:var(--green-dim);color:var(--green)}
.status-invited{background:var(--surface3);color:var(--text2)}
.status-confirmed{background:var(--green-dim);color:var(--green)}
.status-declined{background:var(--red-dim);color:var(--red)}
.priority-high{background:var(--red-dim);color:var(--red)}
.priority-medium{background:var(--orange-dim);color:var(--orange)}
.priority-low{background:var(--surface3);color:var(--text2)}
.vendor-status-active{background:var(--green-dim);color:var(--green)}
.vendor-status-pending{background:var(--yellow-dim,rgba(250,204,21,.1));color:var(--yellow)}
.vendor-status-cancelled{background:var(--red-dim);color:var(--red)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.modal-header{padding:20px 22px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600}
.modal-sub{font-size:12px;color:var(--text3);margin-top:2px}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;font-size:15px;transition:all .15s}
.modal-close:hover{background:var(--surface3);color:var(--text)}
.modal-body{padding:20px 22px}
.modal-footer{padding:0 22px 20px;display:flex;justify-content:flex-end;gap:8px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:5px;font-weight:500}
.empty-sub{font-size:12px;margin-bottom:18px}

/* BUDGET */
.budget-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.budget-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.budget-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600;margin-bottom:5px}
.budget-val{font-size:20px;font-family:var(--font-d)}

/* PROGRESS */
.progress-bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}

/* FILES */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rlg);padding:36px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragging{border-color:var(--accent);background:var(--accent-dim2)}
.file-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.file-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

/* TASKS */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;transition:all .2s}
.task-item.done-task{opacity:.5}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-title{font-size:13px;font-weight:500;color:var(--text);flex:1}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* RUNSHEET */
.runsheet-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);position:relative}
.runsheet-item:last-child{border-bottom:none}
.runsheet-time{font-size:13px;font-weight:600;color:var(--accent);width:58px;flex-shrink:0;padding-top:2px}
.runsheet-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid}
.runsheet-dot.done{background:var(--green);border-color:var(--green)}
.runsheet-dot.ongoing{background:var(--blue);border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.runsheet-dot.pending{background:transparent;border-color:var(--border2)}
.runsheet-line{position:absolute;left:82px;top:18px;bottom:-12px;width:1px;background:var(--border)}
.runsheet-item:last-child .runsheet-line{display:none}
.runsheet-activity{font-size:13px;font-weight:500;color:var(--text)}
.runsheet-notes{font-size:12px;color:var(--text3);margin-top:2px}

/* ANALYTICS */
.chart-container{position:relative;height:200px;margin:8px 0}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100%;padding:0 4px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-wrap{width:100%;display:flex;align-items:flex-end;gap:3px;height:160px}
.bar{flex:1;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:2px;cursor:pointer;position:relative}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:10}
.bar-label{font-size:10px;color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* OVERVIEW GRID */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text3);font-weight:500}
.info-val{font-size:13px;color:var(--text);font-weight:500;text-align:right}

/* COUNTDOWN */
.countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
.cd-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center}
.cd-num{font-size:28px;font-family:var(--font-d);color:var(--accent);line-height:1}
.cd-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* ALERT / NOTIFICATION */
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:rgba(250,204,21,.1);color:var(--yellow);border:1px solid rgba(250,204,21,.2)}
.alert-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.alert-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.alert-info{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,.2)}

/* NOTIFICATIONS PANEL */
.notif-panel{position:fixed;top:52px;right:16px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);z-index:150;box-shadow:0 20px 60px rgba(0,0,0,.6);max-height:440px;overflow-y:auto}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--surface2)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;flex:1;max-width:300px}
.search-bar input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-b);font-size:13px;width:100%}

/* VENDOR CATEGORY */
.vendor-category{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:var(--surface3);color:var(--text2)}

/* MISC */
.text-accent{color:var(--accent)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-muted{color:var(--text3)}
.flex{display:flex}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-2{gap:8px}
.mb-4{margin-bottom:16px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.badge-num{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;min-width:16px;text-align:center}

/* MOBILE OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}

/* RESPONSIVE */
@media(max-width:768px){
  .menu-btn{display:flex}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .overview-grid{grid-template-columns:1fr}
  .budget-summary{grid-template-columns:1fr 1fr}
  .field-row,.field-row3{grid-template-columns:1fr}
  .countdown-grid{grid-template-columns:repeat(2,1fr)}
  .tabs{overflow-x:auto;width:100%}
  .search-bar{max-width:160px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .events-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar{padding:12px 16px}
}

/* TRANSITIONS */
.fade-enter-active,.fade-leave-active{transition:opacity .15s}
.fade-enter-from,.fade-leave-to{opacity:0}
</style>
</head>
<body>
<div id="app">

<!-- AUTH -->
<template v-if="!authUser">
  <div class="auth-wrap">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">✦ Eventflow Pro</div>
      <div class="auth-tagline">Professional event command center</div>
      <div class="auth-tabs">
        <button class="auth-tab" :class="{active:authMode==='login'}" @click="authMode='login'">Sign In</button>
        <button class="auth-tab" :class="{active:authMode==='register'}" @click="authMode='register'">Register</button>
      </div>
      <div v-if="authMode==='login'">
        <div class="field"><label>Email</label><input type="email" v-model="loginForm.email" placeholder="admin@eventflow.io" @keyup.enter="doLogin"/></div>
        <div class="field"><label>Password</label><input type="password" v-model="loginForm.password" placeholder="••••••••" @keyup.enter="doLogin"/></div>
        <button class="btn btn-primary btn-full" @click="doLogin" style="margin-top:6px">Sign In →</button>
        <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:14px">Demo: admin@eventflow.io / password</p>
      </div>
      <div v-else>
        <div class="field"><label>Full Name</label><input v-model="registerForm.name" placeholder="Maria Santos"/></div>
        <div class="field"><label>Email</label><input type="email" v-model="registerForm.email" placeholder="you@example.com"/></div>

              <div class="stat-value">{{currentGuests.length}}</div>
              <div class="stat-sub">{{currentGuests.filter(g=>g.status==='confirmed').length}} confirmed</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Tasks Done</div>
              <div class="stat-value text-accent">{{currentTasks.filter(t=>t.done).length}}/{{currentTasks.length||0}}</div>
              <div class="stat-sub">{{Math.round((currentTasks.filter(t=>t.done).length/Math.max(currentTasks.length,1))*100)}}% complete</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Budget</div>
              <div class="stat-value" :class="budgetVariance<=0?'text-green':'text-red'">{{budgetVariance<=0?'On Track':'Over'}}</div>
              <div class="stat-sub">₱{{formatNumber(Math.abs(budgetVariance))}} {{budgetVariance<=0?'saved':'over'}}</div>
            </div>
          </div>
          <div class="overview-grid">
            <div class="card">
              <div class="card-header"><div class="card-title">Event Details</div><button class="btn btn-ghost btn-sm" @click="openEditEvent(selectedEvent)">Edit</button></div>
              <div class="card-body">
                <div class="info-row"><span class="info-key">Name</span><span class="info-val">{{selectedEvent.name}}</span></div>
                <div class="info-row"><span class="info-key">Type</span><span class="info-val"><span class="event-type-badge" :class="'badge-'+selectedEvent.type" style="font-size:10px">{{selectedEvent.type}}</span></span></div>
                <div class="info-row"><span class="info-key">Date</span><span class="info-val">{{selectedEvent.date}}</span></div>
                <div class="info-row"><span class="info-key">Location</span><span class="info-val">{{selectedEvent.location}}</span></div>
                <div class="info-row" v-if="selectedEvent.notes"><span class="info-key">Notes</span><span class="info-val" style="max-width:200px">{{selectedEvent.notes}}</span></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">Activity Log</div></div>
              <div class="card-body" style="padding:0;max-height:240px;overflow-y:auto">
                <div v-for="log in currentLog" :key="log.id" style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start">
                  <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px"></div>
                  <div>
                    <div style="font-size:12px;color:var(--text)">{{log.text}}</div>
                    <div style="font-size:10px;color:var(--text3);margin-top:1px">{{log.time}}</div>
                  </div>
                </div>
                <div v-if="!currentLog.length" class="empty" style="padding:20px"><div class="empty-sub">No activity yet</div></div>
              </div>
            </div>
          </div>
        </div>

        <!-- TASKS -->
        <div v-if="currentTab==='tasks'">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <button v-for="f in ['all','pending','done']" :key="f" class="btn btn-ghost btn-sm" :class="{active:taskFilter===f}" @click="taskFilter=f" :style="taskFilter===f?'border-color:var(--accent);color:var(--accent)':''">
                {{f.charAt(0).toUpperCase()+f.slice(1)}} {{f==='all'?'('+currentTasks.length+')':(f==='done'?'('+currentTasks.filter(t=>t.done).length+')':'('+currentTasks.filter(t=>!t.done).length+')')}}
              </button>
            </div>
            <button class="btn btn-primary btn-sm" @click="openAddTask">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Task
            </button>
          </div>
          <!-- Task progress bar -->
          <div v-if="currentTasks.length" style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px">
              <span>Progress</span><span>{{currentTasks.filter(t=>t.done).length}} of {{currentTasks.length}} done</span>
            </div>
            <div class="progress-bar" style="height:7px"><div class="progress-fill" :style="{width:Math.round(currentTasks.filter(t=>t.done).length/currentTasks.length*100)+'%',background:'var(--green)'}"></div></div>
          </div>
          <div v-if="!filteredTasks.length" class="empty"><div class="empty-icon">✓</div><div class="empty-text">No tasks here</div></div>
          <div v-else>
            <div class="task-item" v-for="task in filteredTasks" :key="task.id" :class="{'done-task':task.done}">
              <div class="task-check" :class="{checked:task.done}" @click="toggleTask(task)">
                <svg v-if="task.done" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div style="flex:1;min-width:0">
                <div class="task-title" :class="{'done-text':task.done}">{{task.title}}</div>
                <div class="task-meta">
                  <span v-if="task.dueDate" style="display:flex;align-items:center;gap:3px">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span :style="isOverdue(task)?'color:var(--red)':''">{{task.dueDate}}</span>
                  </span>
                  <span v-if="task.notes" style="color:var(--text3)">{{task.notes}}</span>
                </div>
              </div>
              <span class="status" :class="'priority-'+task.priority">{{task.priority}}</span>
              <button class="btn btn-danger btn-sm btn-icon" @click="deleteTask(task.id)">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- TIMELINE -->
        <div v-if="currentTab==='timeline'">
          <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
            <button class="btn btn-primary btn-sm" @click="openAddTimeline">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Item
            </button>
          </div>
          <div v-if="!currentTimeline.length" class="empty"><div class="empty-icon">⏱</div><div class="empty-text">No timeline items</div></div>
          <div v-else class="table-wrap">
            <table>
              <thead><tr><th>Time</th><th>Activity</th><th>Notes</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                <tr v-for="item in sortedTimeline" :key="item.id">
                  <td style="font-weight:600;color:var(--accent);white-space:nowrap">{{item.time}}</td>
                  <td style="font-weight:500">{{item.activity}}</td>
                  <td style="color:var(--text3);max-width:180px">{{item.notes||'—'}}</td>
                  <td>
                    <select class="status" :class="'status-'+item.status" v-model="item.status" style="border:none;background:transparent;cursor:pointer;font-family:var(--font-b)">
                      <option value="pending">pending</option><option value="ongoing">ongoing</option><option value="done">done</option>
                    </select>
                  </td>
                  <td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" @click="openEditTimeline(item)">Edit</button><button class="btn btn-danger btn-sm" @click="deleteTimeline(item.id)">Del</button></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- GUESTS -->
        <div v-if="currentTab==='guests'">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <div style="display:flex;gap:8px">
              <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center">
                <div style="font-size:18px;font-family:var(--font-d)">{{currentGuests.length}}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Total</div>
              </div>
              <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center">
                <div style="font-size:18px;font-family:var(--font-d);color:var(--green)">{{currentGuests.filter(g=>g.status==='confirmed').length}}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Confirmed</div>
              </div>
              <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center">
                <div style="font-size:18px;font-family:var(--font-d);color:var(--yellow)">{{currentGuests.filter(g=>g.status==='invited').length}}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Pending</div>
              </div>
              <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center">
                <div style="font-size:18px;font-family:var(--font-d);color:var(--red)">{{currentGuests.filter(g=>g.status==='declined').length}}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Declined</div>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" @click="openAddGuest">+ Add Guest</button>
          </div>
          <div v-if="!currentGuests.length" class="empty"><div class="empty-icon">👥</div><div class="empty-text">No guests yet</div></div>
          <div v-else class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Contact</th><th>Table</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                <tr v-for="g in currentGuests" :key="g.id">
                  <td style="font-weight:500">
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0">{{g.name.charAt(0).toUpperCase()}}</div>
                      {{g.name}}
                    </div>
                  </td>
                  <td style="color:var(--text3)">{{g.contact||'—'}}</td>
                  <td style="color:var(--text3)">{{g.table?'Table '+g.table:'—'}}</td>
                  <td>
                    <select class="status" :class="'status-'+g.status" v-model="g.status" style="border:none;background:transparent;cursor:pointer;font-family:var(--font-b)">
                      <option value="invited">invited</option><option value="confirmed">confirmed</option><option value="declined">declined</option>
                    </select>
                  </td>
                  <td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" @click="openEditGuest(g)">Edit</button><button class="btn btn-danger btn-sm" @click="deleteGuest(g.id)">Del</button></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- VENDORS -->
        <div v-if="currentTab==='vendors'">
          <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
            <button class="btn btn-primary btn-sm" @click="openAddVendor">+ Add Vendor</button>
          </div>
          <div v-if="!currentVendors.length" class="empty"><div class="empty-icon">🏪</div><div class="empty-text">No vendors yet</div><div class="empty-sub">Add caterers, photographers, venues and more</div></div>
          <div v-else class="table-wrap">
            <table>
              <thead><tr><th>Vendor</th><th>Category</th><th>Contact</th><th>Contract</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                <tr v-for="v in currentVendors" :key="v.id">
                  <td style="font-weight:500">{{v.name}}</td>
                  <td><span class="vendor-category">{{v.category}}</span></td>
                  <td style="color:var(--text3)">{{v.contact||'—'}}</td>
                  <td>
                    <select style="background:transparent;border:none;font-size:11px;color:var(--text2);cursor:pointer;outline:none;font-family:var(--font-b)" v-model="v.contract">
                      <option value="none">No contract</option><option value="signed">Signed</option><option value="pending">Pending</option>
                    </select>
                  </td>
                  <td>₱{{formatNumber(v.amount||0)}}</td>
                  <td>
                    <select class="status" :class="'vendor-status-'+v.status" v-model="v.status" style="border:none;background:transparent;cursor:pointer;font-family:var(--font-b)">
                      <option value="pending">pending</option><option value="active">active</option><option value="cancelled">cancelled</option>
                    </select>
                  </td>
                  <td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" @click="openEditVendor(v)">Edit</button><button class="btn btn-danger btn-sm" @click="deleteVendor(v.id)">Del</button></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- BUDGET -->
        <div v-if="currentTab==='budget'">
          <div class="budget-summary">
            <div class="budget-card"><div class="budget-label">Total Budget</div><div class="budget-val text-accent">₱{{formatNumber(totalBudget)}}</div></div>
            <div class="budget-card"><div class="budget-label">Total Actual</div><div class="budget-val">₱{{formatNumber(totalActual)}}</div></div>
            <div class="budget-card"><div class="budget-label">Variance</div><div class="budget-val" :class="budgetVariance<=0?'text-green':'text-red'">{{budgetVariance<=0?'▼ Saved':'▲ Over'}} ₱{{formatNumber(Math.abs(budgetVariance))}}</div></div>
          </div>
          <div v-if="totalBudget>0" style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px"><span>Budget utilization</span><span>{{Math.round(totalActual/totalBudget*100)}}%</span></div>
            <div class="progress-bar" style="height:7px"><div class="progress-fill" :style="{width:Math.min(100,Math.round(totalActual/totalBudget*100))+'%',background:totalActual>totalBudget?'var(--red)':'var(--green)'}"></div></div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
            <button class="btn btn-primary btn-sm" @click="openAddBudget">+ Add Item</button>
          </div>
          <div v-if="!currentBudget.length" class="empty"><div class="empty-icon">💰</div><div class="empty-text">No budget items</div></div>
          <div v-else class="table-wrap">
            <table>
              <thead><tr><th>Item</th><th>Budget</th><th>Actual</th><th>Difference</th><th>% Used</th><th>Actions</th></tr></thead>
              <tbody>
                <tr v-for="item in currentBudget" :key="item.id">
                  <td style="font-weight:500">{{item.name}}</td>
                  <td>₱{{formatNumber(item.budget)}}</td>
                  <td>₱{{formatNumber(item.actual)}}</td>
                  <td :class="(item.budget-item.actual)>=0?'text-green':'text-red'">{{(item.budget-item.actual)>=0?'▼':'▲'}} ₱{{formatNumber(Math.abs(item.budget-item.actual))}}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="flex:1;min-width:60px"><div class="progress-bar"><div class="progress-fill" :style="{width:Math.min(100,item.budget>0?Math.round(item.actual/item.budget*100):0)+'%',background:item.actual>item.budget?'var(--red)':'var(--accent)'}"></div></div></div>
                      <span style="font-size:11px;color:var(--text3);min-width:28px;text-align:right">{{item.budget>0?Math.round(item.actual/item.budget*100):0}}%</span>
                    </div>
                  </td>
                  <td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" @click="openEditBudget(item)">Edit</button><button class="btn btn-danger btn-sm" @click="deleteBudget(item.id)">Del</button></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- RUNSHEET (Day-of View) -->
        <div v-if="currentTab==='runsheet'">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">Day-of Program</div>
              <div style="font-size:12px;color:var(--text3)">Live runsheet for on-site execution</div>
            </div>
            <div style="display:flex;gap:8px">
              <div style="background:var(--surface2);border:1px solid var(--accent);border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:600;color:var(--accent)">{{liveTime}}</div>
              <button class="btn btn-ghost btn-sm" @click="markAllDone">Mark All Done</button>
            </div>
          </div>
          <!-- Progress summary -->
          <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>{{currentTimeline.filter(t=>t.status==='done').length}} Done</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block"></span>{{currentTimeline.filter(t=>t.status==='ongoing').length}} Ongoing</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:50%;background:var(--border2);display:inline-block;border:2px solid var(--border2)"></span>{{currentTimeline.filter(t=>t.status==='pending').length}} Pending</div>
          </div>
          <div v-if="!currentTimeline.length" class="empty"><div class="empty-icon">📋</div><div class="empty-text">No timeline items</div><div class="empty-sub">Add items in the Timeline tab first</div></div>
          <div v-else style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:18px 20px">
            <div class="runsheet-item" v-for="(item,i) in sortedTimeline" :key="item.id" style="position:relative">
              <div class="runsheet-line" v-if="i<sortedTimeline.length-1"></div>
              <div class="runsheet-time">{{item.time}}</div>
              <div class="runsheet-dot" :class="item.status" style="margin-top:3px;flex-shrink:0"></div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
                  <div>
                    <div class="runsheet-activity">{{item.activity}}</div>
                    <div class="runsheet-notes" v-if="item.notes">{{item.notes}}</div>
                  </div>
                  <div style="display:flex;gap:5px">
                    <button v-if="item.status!=='done'" class="btn btn-success btn-sm" @click="item.status=item.status==='pending'?'ongoing':'done';addLog('Marked &quot;'+item.activity+'&quot; as '+(item.status==='ongoing'?'ongoing':'done'))">
                      {{item.status==='pending'?'Start':'Done ✓'}}
                    </button>
                    <button v-else class="btn btn-ghost btn-sm" @click="item.status='pending'">Reset</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- FILES -->
        <div v-if="currentTab==='files'">
          <div class="upload-zone" @click="triggerFileInput" @dragover.prevent="dragging=true" @dragleave="dragging=false" @drop.prevent="handleDrop" :class="{dragging}" style="margin-bottom:18px">
            <div style="font-size:26px;margin-bottom:8px;opacity:.5">📎</div>
            <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:3px">Click or drag & drop to upload</div>
            <div style="font-size:11px;color:var(--text3)">PDF, images, documents — any type</div>
          </div>
          <input type="file" ref="fileInput" style="display:none" multiple @change="handleFileSelect"/>
          <div v-if="!currentFiles.length" class="empty" style="padding:28px 20px"><div class="empty-text">No files uploaded yet</div></div>
          <div v-else>
            <div class="file-item" v-for="file in currentFiles" :key="file.id">
              <div class="file-icon" :style="{background:fileColor(file.name)+'20',color:fileColor(file.name)}">{{fileEmoji(file.name)}}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{file.name}}</div>
                <div style="font-size:11px;color:var(--text3)">{{file.size}} · {{file.date}}</div>
              </div>
              <button class="btn btn-ghost btn-sm">Download</button>
              <button class="btn btn-danger btn-sm btn-icon" @click="deleteFile(file.id)">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /content -->
  </main>
</template>

<!-- ════ MODALS ════ -->
<!-- Event Modal -->
<div class="modal-overlay" v-if="showEventModal" @click.self="showEventModal=false">
  <div class="modal">
    <div class="modal-header"><div><div class="modal-title">{{editingEvent?'Edit Event':'New Event'}}</div></div><button class="modal-close" @click="showEventModal=false">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Event Name *</label><input v-model="eventForm.name" placeholder="e.g. Santos–Cruz Wedding"/></div>
      <div class="field-row">
        <div class="field"><label>Type</label><select v-model="eventForm.type"><option value="wedding">Wedding</option><option value="birthday">Birthday</option><option value="corporate">Corporate</option><option value="other">Other</option></select></div>
        <div class="field"><label>Date *</label><input type="date" v-model="eventForm.date"/></div>
      </div>
      <div class="field"><label>Location *</label><input v-model="eventForm.location" placeholder="e.g. Ballroom, Cotabato City"/></div>
      <div class="field"><label>Notes</label><textarea v-model="eventForm.notes" placeholder="Any special notes…"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" @click="showEventModal=false">Cancel</button><button class="btn btn-primary" @click="saveEvent">{{editingEvent?'Save Changes':'Create Event'}}</button></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" v-if="showTaskModal" @click.self="showTaskModal=false">
  <div class="modal">
    <div class="modal-header"><div><div class="modal-title">Add Task</div></div><button class="modal-close" @click="showTaskModal=false">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Task Title *</label><input v-model="taskForm.title" placeholder="e.g. Confirm catering menu"/></div>
      <div class="field-row">

<script>
const{createApp,ref,computed,reactive,onMounted,onUnmounted}=Vue;
createApp({
  setup(){
    /* AUTH */
    const authUser=ref(null),authMode=ref('login'),loginForm=reactive({email:'admin@eventflow.io',password:'password'}),registerForm=reactive({name:'',email:'',password:''});
    function doLogin(){if(!loginForm.email||!loginForm.password)return;authUser.value={id:1,name:'Maria Santos',email:loginForm.email};}
    function doRegister(){if(!registerForm.name||!registerForm.email||!registerForm.password)return;authUser.value={id:1,name:registerForm.name,email:registerForm.email};}
    function doLogout(){authUser.value=null;selectedEvent.value=null;currentView.value='dashboard';}

    /* NAV */
    const currentView=ref('dashboard'),currentTab=ref('overview'),sidebarOpen=ref(false),searchQuery=ref('');
    function navigate(v,t='overview'){currentView.value=v;currentTab.value=t;}
    const topbarTitle=computed(()=>{const m={dashboard:'Dashboard',events:'Events',analytics:'Analytics'};if(currentView.value==='event-detail'&&selectedEvent.value)return selectedEvent.value.name;return m[currentView.value]||'';});
    const topbarBreadcrumb=computed(()=>{if(currentView.value==='event-detail')return`Events / ${selectedEvent.value?.name}`;return null;});
    const timeOfDay=computed(()=>{const h=new Date().getHours();if(h<12)return'morning';if(h<17)return'afternoon';return'evening';});

    /* NOTIFICATIONS */
    const showNotifs=ref(false);
    const notifications=ref([
      {id:1,text:'Catering budget is 96% used for Santos–Cruz Wedding',color:'#facc15',time:'2 hours ago',read:false},
      {id:2,text:'3 guests haven\'t RSVPed for Santos–Cruz Wedding',color:'#60a5fa',time:'Yesterday',read:false},
      {id:3,text:'Task "Confirm venue deposit" is overdue',color:'#f87171',time:'2 days ago',read:true},
    ]);
    const unreadNotifs=computed(()=>notifications.value.filter(n=>!n.read).length);
    function markAllRead(){notifications.value.forEach(n=>n.read=true);}

    /* LIVE CLOCK */
    const liveTime=ref('');
    function updateTime(){liveTime.value=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
    let clockInterval;
    onMounted(()=>{updateTime();clockInterval=setInterval(updateTime,1000);});
    onUnmounted(()=>clearInterval(clockInterval));

    /* EVENTS */
    let nextId=50;
    const events=ref([
      {id:1,name:'Santos–Cruz Wedding',type:'wedding',date:'2025-12-14',location:'Grand Ballroom, Cotabato City',notes:'Garden ceremony + indoor reception'},
      {id:2,name:'TechCorp Annual Summit',type:'corporate',date:'2025-11-08',location:'SMX Convention Center, CDO',notes:''},
    ]);
    const selectedEvent=ref(null),showEventModal=ref(false),editingEvent=ref(null);
    const eventForm=reactive({name:'',type:'wedding',date:'',location:'',notes:''});
    const filteredEvents=computed(()=>{if(!searchQuery.value)return events.value;const q=searchQuery.value.toLowerCase();return events.value.filter(e=>e.name.toLowerCase().includes(q)||e.location.toLowerCase().includes(q)||e.type.includes(q));});
    function openCreateEvent(){editingEvent.value=null;Object.assign(eventForm,{name:'',type:'wedding',date:'',location:'',notes:''});showEventModal.value=true;}
    function openEditEvent(ev){editingEvent.value=ev;Object.assign(eventForm,{...ev});showEventModal.value=true;}
    function saveEvent(){if(!eventForm.name||!eventForm.date||!eventForm.location)return;if(editingEvent.value){Object.assign(editingEvent.value,{...eventForm});}else{events.value.push({id:nextId++,...eventForm});}showEventModal.value=false;}
    function deleteEvent(id){if(!confirm('Delete this event?'))return;events.value=events.value.filter(e=>e.id!==id);if(selectedEvent.value?.id===id){selectedEvent.value=null;currentView.value='events';}}
    function selectEvent(ev){selectedEvent.value=ev;currentView.value='event-detail';currentTab.value='overview';}

    /* COUNTDOWN */
    function countdownTo(dateStr){const t=new Date(dateStr)-new Date();if(t<0)return[{val:0,label:'days'},{val:0,label:'hours'},{val:0,label:'minutes'},{val:0,label:'seconds'}];const d=Math.floor(t/86400000),h=Math.floor((t%86400000)/3600000),m=Math.floor((t%3600000)/60000),s=Math.floor((t%60000)/1000);return[{val:d,label:'days'},{val:h,label:'hours'},{val:m,label:'min'},{val:s,label:'sec'}];}
    const upcomingEvent=computed(()=>{const now=new Date();return events.value.filter(e=>new Date(e.date)>now).sort((a,b)=>new Date(a.date)-new Date(b.date))[0]||null;});

    /* ACTIVITY LOG */
    const logs=ref({1:[{id:1,text:'Event created',time:'Aug 1, 2025 · 9:00 AM'},{id:2,text:'Added 5 guests to guest list',time:'Aug 5, 2025 · 2:30 PM'},{id:3,text:'Updated catering budget item',time:'Aug 10, 2025 · 4:15 PM'}],2:[]});
    const currentLog=computed(()=>logs.value[selectedEvent.value?.id]||[]);
    function addLog(text){const list=logs.value[selectedEvent.value?.id]||(logs.value[selectedEvent.value?.id]=[]);list.unshift({id:nextId++,text,time:new Date().toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})});}

    /* TASKS */
    const tasks=ref({
      1:[
        {id:1,title:'Confirm final headcount with caterer',dueDate:'2025-11-30',priority:'high',notes:'At least 2 weeks before',done:false},
        {id:2,title:'Collect remaining balance from couple',dueDate:'2025-12-01',priority:'high',notes:'',done:false},
        {id:3,title:'Finalize seating arrangement',dueDate:'2025-12-07',priority:'medium',notes:'',done:false},
        {id:4,title:'Confirm sound check schedule with band',dueDate:'2025-12-10',priority:'medium',notes:'',done:true},
        {id:5,title:'Print event runsheet for team',dueDate:'2025-12-13',priority:'low',notes:'',done:false},
      ],
      2:[
        {id:6,title:'Send invitations to speakers',dueDate:'2025-10-01',priority:'high',notes:'',done:true},
        {id:7,title:'Book accommodation for out-of-town guests',dueDate:'2025-10-15',priority:'medium',notes:'',done:false},
      ]
    });
    const taskFilter=ref('all'),showTaskModal=ref(false);
    const taskForm=reactive({title:'',dueDate:'',priority:'medium',notes:''});
    const currentTasks=computed(()=>tasks.value[selectedEvent.value?.id]||[]);
    const filteredTasks=computed(()=>{if(taskFilter.value==='all')return currentTasks.value;if(taskFilter.value==='done')return currentTasks.value.filter(t=>t.done);return currentTasks.value.filter(t=>!t.done);});
    const pendingTasksCount=computed(()=>currentTasks.value.filter(t=>!t.done).length);
    const pendingTasksAll=computed(()=>Object.values(tasks.value).reduce((s,l)=>s+l.filter(t=>!t.done).length,0));
    const allPendingTasks=computed(()=>events.value.flatMap(ev=>(tasks.value[ev.id]||[]).filter(t=>!t.done).map(t=>({...t,eventName:ev.name}))));
    const overdueTasksCount=computed(()=>{const today=new Date().toISOString().split('T')[0];return Object.values(tasks.value).reduce((s,l)=>s+l.filter(t=>!t.done&&t.dueDate&&t.dueDate<today).length,0);});
    function isOverdue(t){const today=new Date().toISOString().split('T')[0];return!t.done&&t.dueDate&&t.dueDate<today;}
    function openAddTask(){Object.assign(taskForm,{title:'',dueDate:'',priority:'medium',notes:''});showTaskModal.value=true;}
    function saveTask(){if(!taskForm.title)return;const list=tasks.value[selectedEvent.value.id]||(tasks.value[selectedEvent.value.id]=[]);list.push({id:nextId++,...taskForm,done:false});showTaskModal.value=false;addLog('Added task: '+taskForm.title);}
    function deleteTask(id){tasks.value[selectedEvent.value.id]=tasks.value[selectedEvent.value.id].filter(t=>t.id!==id);}
    function toggleTask(t){t.done=!t.done;addLog((t.done?'Completed':'Reopened')+' task: '+t.title);}
    function eventTaskProgress(id){const list=tasks.value[id]||[];const total=list.length,done=list.filter(t=>t.done).length;return{total,done,pct:total?Math.round(done/total*100):0};}

    /* TIMELINE */
    const timelines=ref({1:[{id:1,time:'10:00',activity:'Guest arrival & registration',notes:'Assign ushers at gate',status:'done'},{id:2,time:'11:00',activity:'Ceremony begins',notes:'Fr. Marco officiates',status:'ongoing'},{id:3,time:'12:30',activity:'Cocktail hour',notes:'Garden area',status:'pending'},{id:4,time:'14:00',activity:'Reception & lunch',notes:'Ballroom, 10 tables',status:'pending'},{id:5,time:'16:00',activity:'Cake cutting',notes:'',status:'pending'},{id:6,time:'17:00',activity:'First dance',notes:'',status:'pending'}],2:[{id:7,time:'08:00',activity:'Registration & networking',notes:'Coffee at lobby',status:'pending'},{id:8,time:'09:00',activity:'Opening keynote',notes:'CEO presentation',status:'pending'}]});
    const showTimelineModal=ref(false),editingTimeline=ref(null);
    const timelineForm=reactive({time:'',activity:'',notes:'',status:'pending'});
    const currentTimeline=computed(()=>timelines.value[selectedEvent.value?.id]||[]);
    const sortedTimeline=computed(()=>[...currentTimeline.value].sort((a,b)=>a.time.localeCompare(b.time)));
    function openAddTimeline(){editingTimeline.value=null;Object.assign(timelineForm,{time:'',activity:'',notes:'',status:'pending'});showTimelineModal.value=true;}
    function openEditTimeline(item){editingTimeline.value=item;Object.assign(timelineForm,{...item});showTimelineModal.value=true;}
    function saveTimeline(){if(!timelineForm.time||!timelineForm.activity)return;const list=timelines.value[selectedEvent.value.id]||(timelines.value[selectedEvent.value.id]=[]);if(editingTimeline.value){Object.assign(editingTimeline.value,{...timelineForm});}else{list.push({id:nextId++,...timelineForm});}showTimelineModal.value=false;}
    function deleteTimeline(id){timelines.value[selectedEvent.value.id]=timelines.value[selectedEvent.value.id].filter(t=>t.id!==id);}
    function markAllDone(){(timelines.value[selectedEvent.value.id]||[]).forEach(t=>t.status='done');addLog('Marked all timeline items as done');}

    /* GUESTS */
    const guests=ref({1:[{id:1,name:'Elena Reyes',contact:'+63 917 555 0101',status:'confirmed',table:1},{id:2,name:'Marco Dela Cruz',contact:'marco@email.com',status:'confirmed',table:1},{id:3,name:'Liza Tan',contact:'+63 918 555 0202',status:'invited',table:null},{id:4,name:'Rico Almonte',contact:'',status:'declined',table:null},{id:5,name:'Jasmine Ong',contact:'+63 921 555 0303',status:'confirmed',table:2}],2:[{id:6,name:'Dir. Santos',contact:'dir@techcorp.com',status:'confirmed',table:null},{id:7,name:'Ana Morales',contact:'ana@techcorp.com',status:'invited',table:null}]});
    const showGuestModal=ref(false),editingGuest=ref(null);
    const guestForm=reactive({name:'',contact:'',status:'invited',table:null});
    const currentGuests=computed(()=>guests.value[selectedEvent.value?.id]||[]);
    const totalGuestsAll=computed(()=>Object.values(guests.value).reduce((s,l)=>s+l.length,0));
    const totalConfirmedAll=computed(()=>Object.values(guests.value).reduce((s,l)=>s+l.filter(g=>g.status==='confirmed').length,0));
    function openAddGuest(){editingGuest.value=null;Object.assign(guestForm,{name:'',contact:'',status:'invited',table:null});showGuestModal.value=true;}
    function openEditGuest(g){editingGuest.value=g;Object.assign(guestForm,{...g});showGuestModal.value=true;}
    function saveGuest(){if(!guestForm.name)return;const list=guests.value[selectedEvent.value.id]||(guests.value[selectedEvent.value.id]=[]);if(editingGuest.value){Object.assign(editingGuest.value,{...guestForm});}else{list.push({id:nextId++,...guestForm});}showGuestModal.value=false;addLog((editingGuest.value?'Updated':'Added')+' guest: '+guestForm.name);}
    function deleteGuest(id){guests.value[selectedEvent.value.id]=guests.value[selectedEvent.value.id].filter(g=>g.id!==id);}
    const guestStats=computed(()=>[{label:'Confirmed',count:totalConfirmedAll.value,color:'var(--green)'},{label:'Invited (pending)',count:Object.values(guests.value).reduce((s,l)=>s+l.filter(g=>g.status==='invited').length,0),color:'var(--yellow)'},{label:'Declined',count:Object.values(guests.value).reduce((s,l)=>s+l.filter(g=>g.status==='declined').length,0),color:'var(--red)'}]);

    /* VENDORS */
    const vendors=ref({1:[{id:1,name:'La Mesa Catering',category:'Catering',contact:'+63 912 888 0001',contract:'signed',amount:125000,status:'active',notes:''},{id:2,name:'Lens & Love Photography',category:'Photography',contact:'lensandlove@gmail.com',contract:'signed',amount:25000,status:'active',notes:''},{id:3,name:'Bloom & Co Flowers',category:'Flowers',contact:'+63 916 777 0002',contract:'pending',amount:32000,status:'pending',notes:'Waiting for final deposit'}],2:[{id:4,name:'AV Masters CDO',category:'Sound & Lights',contact:'avmasters@cdomain.com',contract:'signed',amount:28000,status:'active',notes:''}]});
    const showVendorModal=ref(false),editingVendor=ref(null);
    const vendorForm=reactive({name:'',category:'Catering',contact:'',contract:'none',amount:0,status:'pending',notes:''});
    const currentVendors=computed(()=>vendors.value[selectedEvent.value?.id]||[]);
    function openAddVendor(){editingVendor.value=null;Object.assign(vendorForm,{name:'',category:'Catering',contact:'',contract:'none',amount:0,status:'pending',notes:''});showVendorModal.value=true;}
    function openEditVendor(v){editingVendor.value=v;Object.assign(vendorForm,{...v});showVendorModal.value=true;}
    function saveVendor(){if(!vendorForm.name)return;const list=vendors.value[selectedEvent.value.id]||(vendors.value[selectedEvent.value.id]=[]);if(editingVendor.value){Object.assign(editingVendor.value,{...vendorForm});}else{list.push({id:nextId++,...vendorForm});}showVendorModal.value=false;addLog((editingVendor.value?'Updated':'Added')+' vendor: '+vendorForm.name);}
    function deleteVendor(id){vendors.value[selectedEvent.value.id]=vendors.value[selectedEvent.value.id].filter(v=>v.id!==id);}

    /* BUDGET */
    const budgets=ref({1:[{id:1,name:'Venue',budget:80000,actual:75000},{id:2,name:'Catering',budget:120000,actual:125000},{id:3,name:'Flowers & Decor',budget:35000,actual:32000},{id:4,name:'Photography',budget:25000,actual:25000},{id:5,name:'Sound & Lights',budget:20000,actual:18500},{id:6,name:'Wedding Cake',budget:8000,actual:7500}],2:[{id:7,name:'Venue Rental',budget:50000,actual:48000},{id:8,name:'Catering',budget:60000,actual:62000},{id:9,name:'AV Equipment',budget:30000,actual:28000}]});
    const showBudgetModal=ref(false),editingBudget=ref(null);
    const budgetForm=reactive({name:'',budget:0,actual:0});
    const currentBudget=computed(()=>budgets.value[selectedEvent.value?.id]||[]);
    const totalBudget=computed(()=>currentBudget.value.reduce((s,i)=>s+(i.budget||0),0));
    const totalActual=computed(()=>currentBudget.value.reduce((s,i)=>s+(i.actual||0),0));
    const budgetVariance=computed(()=>totalActual.value-totalBudget.value);
    const totalBudgetAll=computed(()=>Object.values(budgets.value).reduce((s,l)=>s+l.reduce((ss,i)=>ss+(i.budget||0),0),0));
    const totalActualAll=computed(()=>Object.values(budgets.value).reduce((s,l)=>s+l.reduce((ss,i)=>ss+(i.actual||0),0),0));
    function totalBudgetForEvent(id){return(budgets.value[id]||[]).reduce((s,i)=>s+(i.budget||0),0);}
    function totalActualForEvent(id){return(budgets.value[id]||[]).reduce((s,i)=>s+(i.actual||0),0);}
    const maxBudgetAll=computed(()=>Math.max(...events.value.map(e=>Math.max(totalBudgetForEvent(e.id),totalActualForEvent(e.id))),1));
    function openAddBudget(){editingBudget.value=null;Object.assign(budgetForm,{name:'',budget:0,actual:0});showBudgetModal.value=true;}
    function openEditBudget(item){editingBudget.value=item;Object.assign(budgetForm,{...item});showBudgetModal.value=true;}
    function saveBudget(){if(!budgetForm.name)return;const list=budgets.value[selectedEvent.value.id]||(budgets.value[selectedEvent.value.id]=[]);if(editingBudget.value){Object.assign(editingBudget.value,{...budgetForm});}else{list.push({id:nextId++,...budgetForm});}showBudgetModal.value=false;}
    function deleteBudget(id){budgets.value[selectedEvent.value.id]=budgets.value[selectedEvent.value.id].filter(b=>b.id!==id);}
    const budgetAlerts=computed(()=>{const alerts=[];Object.entries(budgets.value).forEach(([evId,list])=>{const ev=events.value.find(e=>e.id==evId);if(!ev)return;list.forEach(item=>{if(item.budget>0&&item.actual/item.budget>=0.9&&item.actual<=item.budget)alerts.push(`"${item.name}" for ${ev.name} is ${Math.round(item.actual/item.budget*100)}% of budget`);});});return alerts.slice(0,2);});

    /* FILES */
    const files=ref({1:[{id:1,name:'Venue_Contract.pdf',size:'2.3 MB',date:'2025-08-01'},{id:2,name:'Catering_Quotation.docx',size:'145 KB',date:'2025-08-05'},{id:3,name:'Guest_List_v2.xlsx',size:'88 KB',date:'2025-08-10'}],2:[{id:4,name:'Summit_Agenda.pdf',size:'1.1 MB',date:'2025-09-01'}]});
    const dragging=ref(false),fileInput=ref(null);
    const currentFiles=computed(()=>files.value[selectedEvent.value?.id]||[]);
    function triggerFileInput(){fileInput.value?.click();}
    function handleDrop(e){dragging.value=false;Array.from(e.dataTransfer.files).forEach(f=>addFile(f));}
    function handleFileSelect(e){Array.from(e.target.files).forEach(f=>addFile(f));e.target.value='';}
    function addFile(f){const list=files.value[selectedEvent.value.id]||(files.value[selectedEvent.value.id]=[]);list.push({id:nextId++,name:f.name,size:fmtSize(f.size),date:new Date().toISOString().split('T')[0]});addLog('Uploaded file: '+f.name);}
    function deleteFile(id){files.value[selectedEvent.value.id]=files.value[selectedEvent.value.id].filter(f=>f.id!==id);}
    function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(0)+' KB';return(b/1048576).toFixed(1)+' MB';}
    function fileEmoji(n){const e=n.split('.').pop().toLowerCase();return{pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',jpg:'🖼',jpeg:'🖼',png:'🖼',mp4:'🎬',mp3:'🎵',zip:'📦'}[e]||'📎';}
    function fileColor(n){const e=n.split('.').pop().toLowerCase();if(['pdf'].includes(e))return'#f87171';if(['doc','docx'].includes(e))return'#60a5fa';if(['xls','xlsx'].includes(e))return'#4ade80';if(['jpg','jpeg','png'].includes(e))return'#a78bfa';return'#9998aa';}

    /* ANALYTICS */
    const avgGuests=computed(()=>events.value.length?Math.round(totalGuestsAll.value/events.value.length):0);
    const budgetEfficiency=computed(()=>{if(!totalBudgetAll.value)return 0;const saved=totalBudgetAll.value-totalActualAll.value;return Math.max(0,Math.round(saved/totalBudgetAll.value*100));});
    const taskCompletionRate=computed(()=>{const all=Object.values(tasks.value).flat();return all.length?Math.round(all.filter(t=>t.done).length/all.length*100):0;});
    const eventsByType=computed(()=>{const types=['wedding','birthday','corporate','other'];const colors={wedding:'var(--purple)',birthday:'var(--orange)',corporate:'var(--blue)',other:'var(--text2)'};return types.map(t=>({type:t,count:events.value.filter(e=>e.type===t).length,color:colors[t]})).filter(t=>t.count>0);});
    function barHeight(val,max){return max>0?Math.max(4,Math.round(val/max*100)):4;}

    /* UTILS */
    function formatNumber(n){return(n||0).toLocaleString('en-PH');}

    return{
      authUser,authMode,loginForm,registerForm,doLogin,doRegister,doLogout,
      currentView,currentTab,sidebarOpen,searchQuery,navigate,topbarTitle,topbarBreadcrumb,timeOfDay,
      showNotifs,notifications,unreadNotifs,markAllRead,liveTime,
      events,selectedEvent,showEventModal,editingEvent,eventForm,filteredEvents,
      openCreateEvent,openEditEvent,saveEvent,deleteEvent,selectEvent,upcomingEvent,countdownTo,
      logs,currentLog,addLog,
      tasks,taskFilter,showTaskModal,taskForm,currentTasks,filteredTasks,
      pendingTasksCount,pendingTasksAll,allPendingTasks,overdueTasksCount,isOverdue,
      openAddTask,saveTask,deleteTask,toggleTask,eventTaskProgress,
      timelines,showTimelineModal,editingTimeline,timelineForm,currentTimeline,sortedTimeline,
      openAddTimeline,openEditTimeline,saveTimeline,deleteTimeline,markAllDone,
      guests,showGuestModal,editingGuest,guestForm,currentGuests,
      totalGuestsAll,totalConfirmedAll,guestStats,
      openAddGuest,openEditGuest,saveGuest,deleteGuest,
      vendors,showVendorModal,editingVendor,vendorForm,currentVendors,
      openAddVendor,openEditVendor,saveVendor,deleteVendor,
      budgets,showBudgetModal,editingBudget,budgetForm,currentBudget,
      totalBudget,totalActual,budgetVariance,totalBudgetAll,totalActualAll,
      totalBudgetForEvent,totalActualForEvent,maxBudgetAll,budgetAlerts,
      openAddBudget,openEditBudget,saveBudget,deleteBudget,
      files,dragging,fileInput,currentFiles,
      triggerFileInput,handleDrop,handleFileSelect,deleteFile,fileEmoji,fileColor,
      avgGuests,budgetEfficiency,taskCompletionRate,eventsByType,barHeight,
      formatNumber,
    };
  }
}).mount('#app');
</script>
